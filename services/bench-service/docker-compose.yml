version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: bench-service-postgres
    environment:
      POSTGRES_USER: aeva
      POSTGRES_PASSWORD: aeva
      POSTGRES_DB: bench_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeva"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bench Service
  bench-service:
    build: .
    container_name: bench-service
    environment:
      DATABASE_URL: postgresql://aeva:aeva@postgres:5432/bench_service
      LOG_LEVEL: DEBUG
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app:ro  # Mount app code for hot reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  postgres_data:
