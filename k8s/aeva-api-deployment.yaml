apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeva-api
  namespace: aeva
  labels:
    app: aeva-api
    component: api-server
spec:
  replicas: 3
  selector:
    matchLabels:
      app: aeva-api
  template:
    metadata:
      labels:
        app: aeva-api
        component: api-server
    spec:
      containers:
      - name: aeva-api
        image: aeva:latest
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        env:
        - name: AEVA_ENV
          value: "production"
        - name: AEVA_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: aeva-config
              key: db_host
        - name: AEVA_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: aeva-secrets
              key: db_password
        - name: AEVA_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: aeva-config
              key: redis_host
        - name: AEVA_BRAIN_API_KEY
          valueFrom:
            secretKeyRef:
              name: aeva-secrets
              key: brain_api_key
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: config
        configMap:
          name: aeva-config
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aeva-api
  namespace: aeva
  labels:
    app: aeva-api
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: aeva-api
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aeva-api-hpa
  namespace: aeva
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aeva-api
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 4
        periodSeconds: 30
      selectPolicy: Max
