apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aeva-ingress
  namespace: aeva
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  tls:
  - hosts:
    - aeva.example.com
    - api.aeva.example.com
    secretName: aeva-tls
  rules:
  - host: api.aeva.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aeva-api
            port:
              number: 8000
  - host: aeva.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aeva-dashboard
            port:
              number: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: aeva-dashboard
  namespace: aeva
  labels:
    app: aeva-dashboard
spec:
  type: ClusterIP
  ports:
  - port: 8501
    targetPort: 8501
    protocol: TCP
    name: http
  selector:
    app: aeva-dashboard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aeva-dashboard
  namespace: aeva
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aeva-dashboard
  template:
    metadata:
      labels:
        app: aeva-dashboard
    spec:
      containers:
      - name: dashboard
        image: aeva:latest
        command: ["streamlit", "run", "aeva/dashboard/app.py"]
        args:
        - "--server.port=8501"
        - "--server.address=0.0.0.0"
        - "--server.headless=true"
        ports:
        - containerPort: 8501
        env:
        - name: AEVA_DB_HOST
          valueFrom:
            configMapKeyRef:
              name: aeva-config
              key: db_host
        - name: AEVA_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: aeva-config
              key: redis_host
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
