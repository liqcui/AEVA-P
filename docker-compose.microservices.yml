version: '3.8'

services:
  # Database Services
  bench-postgres:
    image: postgres:15-alpine
    container_name: bench-postgres
    environment:
      POSTGRES_USER: aeva
      POSTGRES_PASSWORD: aeva
      POSTGRES_DB: bench_service
    ports:
      - "5433:5432"
    volumes:
      - bench-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeva"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aeva-network

  auto-postgres:
    image: postgres:15-alpine
    container_name: auto-postgres
    environment:
      POSTGRES_USER: aeva
      POSTGRES_PASSWORD: aeva
      POSTGRES_DB: auto_service
    ports:
      - "5434:5432"
    volumes:
      - auto-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeva"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aeva-network

  brain-postgres:
    image: postgres:15-alpine
    container_name: brain-postgres
    environment:
      POSTGRES_USER: aeva
      POSTGRES_PASSWORD: aeva
      POSTGRES_DB: brain_service
    ports:
      - "5435:5432"
    volumes:
      - brain-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeva"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aeva-network

  # Redis Services
  guard-redis:
    image: redis:7-alpine
    container_name: guard-redis
    ports:
      - "6379:6379"
    volumes:
      - guard-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aeva-network

  auto-redis:
    image: redis:7-alpine
    container_name: auto-redis
    ports:
      - "6380:6379"
    volumes:
      - auto-redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - aeva-network

  # Microservices
  bench-service:
    build:
      context: ./services/bench-service
      dockerfile: Dockerfile
    container_name: bench-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://aeva:aeva@bench-postgres:5432/bench_service
      - API_V1_STR=/v1
      - PROJECT_NAME=AEVA Bench Service
    depends_on:
      bench-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aeva-network

  guard-service:
    build:
      context: ./services/guard-service
      dockerfile: Dockerfile
    container_name: guard-service
    ports:
      - "8002:8002"
    environment:
      - REDIS_URL=redis://guard-redis:6379/0
      - REDIS_CACHE_TTL=3600
      - DEFAULT_THRESHOLD=0.85
      - DEFAULT_STRICT_MODE=false
      - DEFAULT_AUTO_BLOCK=true
      - MAX_HISTORY_SIZE=1000
      - API_V1_STR=/v1
      - PROJECT_NAME=AEVA Guard Service
    depends_on:
      guard-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aeva-network

  auto-service:
    build:
      context: ./services/auto-service
      dockerfile: Dockerfile
    container_name: auto-service
    ports:
      - "8003:8003"
    environment:
      - DATABASE_URL=postgresql://aeva:aeva@auto-postgres:5432/auto_service
      - REDIS_URL=redis://auto-redis:6379/0
      - CELERY_BROKER_URL=redis://auto-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://auto-redis:6379/1
      - BENCH_SERVICE_URL=http://bench-service:8001
      - GUARD_SERVICE_URL=http://guard-service:8002
      - BRAIN_SERVICE_URL=http://brain-service:8004
      - DEFAULT_TIMEOUT=3600
      - MAX_RETRIES=3
      - RETRY_DELAY=60
      - API_V1_STR=/v1
      - PROJECT_NAME=AEVA Auto Service
    depends_on:
      auto-postgres:
        condition: service_healthy
      auto-redis:
        condition: service_healthy
      bench-service:
        condition: service_started
      guard-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - aeva-network

  auto-celery-worker:
    build:
      context: ./services/auto-service
      dockerfile: Dockerfile
    container_name: auto-celery-worker
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql://aeva:aeva@auto-postgres:5432/auto_service
      - REDIS_URL=redis://auto-redis:6379/0
      - CELERY_BROKER_URL=redis://auto-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://auto-redis:6379/1
      - BENCH_SERVICE_URL=http://bench-service:8001
      - GUARD_SERVICE_URL=http://guard-service:8002
      - BRAIN_SERVICE_URL=http://brain-service:8004
      - DEFAULT_TIMEOUT=3600
      - MAX_RETRIES=3
      - RETRY_DELAY=60
    depends_on:
      auto-postgres:
        condition: service_healthy
      auto-redis:
        condition: service_healthy
      bench-service:
        condition: service_started
      guard-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - aeva-network

  brain-service:
    build:
      context: ./services/brain-service
      dockerfile: Dockerfile
    container_name: brain-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://aeva:aeva@brain-postgres:5432/brain_service
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_TEMPERATURE=0.7
      - LLM_MAX_TOKENS=2000
      - BENCH_SERVICE_URL=http://bench-service:8001
      - GUARD_SERVICE_URL=http://guard-service:8002
      - MAX_CONTEXT_LENGTH=8000
      - ENABLE_CACHING=true
      - CACHE_TTL=3600
      - API_V1_STR=/v1
      - PROJECT_NAME=AEVA Brain Service
    depends_on:
      brain-postgres:
        condition: service_healthy
      bench-service:
        condition: service_started
      guard-service:
        condition: service_started
    restart: unless-stopped
    networks:
      - aeva-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8000"
    environment:
      - API_V1_STR=/api/v1
      - PROJECT_NAME=AEVA API Gateway
      - BENCH_SERVICE_URL=http://bench-service:8001
      - GUARD_SERVICE_URL=http://guard-service:8002
      - AUTO_SERVICE_URL=http://auto-service:8003
      - BRAIN_SERVICE_URL=http://brain-service:8004
      - REQUEST_TIMEOUT=300
      - MAX_RETRIES=3
      - RETRY_DELAY=1
      - ENABLE_RATE_LIMITING=true
      - RATE_LIMIT_PER_MINUTE=100
      - ENABLE_AUTH=false
      - CORS_ORIGINS=["*"]
      - LOG_LEVEL=INFO
    depends_on:
      - bench-service
      - guard-service
      - auto-service
      - brain-service
    restart: unless-stopped
    networks:
      - aeva-network

volumes:
  bench-postgres-data:
  auto-postgres-data:
  brain-postgres-data:
  guard-redis-data:
  auto-redis-data:

networks:
  aeva-network:
    driver: bridge
